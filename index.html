<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixWall</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topo">
    <h2>PixWall</h2>
</div>

<div class="tela">

    <div class="lateral esquerda">
        <div id="miniaturas-esquerda"></div>
    </div>

    <div class="centro">

        <div class="novo" id="novo">
            🔥 NOVO!
        </div>

        <img id="fotoPrincipal" src="" alt="">

        <div class="painelQR">

            <h3>ESCANEIE PARA ENVIAR SUAS FOTOS</h3>

            <img id="qrcode" src="qr.png" alt="QR Code">

            <input type="file" id="fotos" multiple accept="image/*">

        </div>

    </div>

    <div class="lateral direita">
        <div id="miniaturas-direita"></div>
    </div>

</div>

<script src="script.js"></script>

</body>

</html>
